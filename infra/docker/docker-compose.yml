version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
